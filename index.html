<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHS Lions - Teachable Machine & Dino Game</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<header class="text-white p-3 d-flex justify-content-between align-items-center shadow-sm main-header">
    <h1 class="h4 m-0 fw-bold">Westminster High School</h1>
    <span class="small text-white-50 fst-italic">Home of the Lions</span>
</header>

<section class="container my-4 text-center">
    <div class="p-3 bg-white rounded shadow-sm border logo-banner-container">
        <img src="WestminsterHS_Primary.png" alt="Westminster High School Logo" class="img-fluid school-banner-img">
    </div>
</section>

<main class="container mb-5 shadow-wrapper">
    <div class="card shadow border-0">
        <div class="card-body p-4">
            
            <h2 class="h5 pb-2 mb-3 border-bottom fw-bold text-dark">1. Upload Model Resources</h2>
            <div class="p-4 mb-4 rounded bg-body-tertiary text-center border border-2 border-secondary border-opacity-25 upload-dashbox">
                <p class="small text-muted mb-2">
                    Select your exported <strong>.zip</strong> archive containing <em>model.json</em>, <em>weights.bin</em>, and <em>metadata.json</em>.
                </p>
                <input type="file" id="zip-selector" accept=".zip" class="form-control d-inline-block w-auto mx-auto mt-2">
            </div>

            <h2 class="h5 pb-2 mb-3 border-bottom fw-bold text-dark">2. Analytics Panel</h2>
            <div class="mb-4">
                <button type="button" id="btn-start" class="btn text-white px-4 fw-bold me-2 shadow-sm">Start Camera & Game</button>
                <button type="button" id="btn-stop" class="btn btn-dark px-4 fw-bold shadow-sm">Stop</button>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-sm-6 text-center">
                    <div class="text-uppercase small fw-bold tracking-wider text-secondary mb-3">Live Feed</div>
                    <div id="webcam-container" class="d-inline-block border border-3 border-dark rounded bg-black shadow-sm webcam-frame">
                    </div>
                </div>
                
                <div class="col-sm-6">
                    <div class="text-uppercase small fw-bold tracking-wider text-secondary mb-3">Classification Accuracy</div>
                    <div id="label-container">
                    </div>
                </div>
            </div>

            <h2 class="h5 pb-2 mb-3 mt-5 border-bottom fw-bold text-dark">3. Jump Game Control</h2>
            <div class="text-center position-relative">
                <div class="text-uppercase small fw-bold tracking-wider text-secondary mb-2">When Class 1 > 50%, the block jumps!</div>
                <canvas id="gameCanvas" width="600" height="150" class="border border-2 border-dark rounded bg-white shadow-sm game-surface"></canvas>
                
                <div id="gameOverScreen" class="position-absolute top-50 start-50 translate-middle d-none text-center bg-white p-4 border border-3 border-dark rounded shadow-lg game-overlay">
                    <h3 class="text-danger fw-bold mb-1">Game Over</h3>
                    <p class="mb-3 fw-bold">Score: <span id="finalScore" class="text-primary">0</span></p>
                    <button type="button" id="btn-restart" class="btn btn-dark fw-bold px-4">Restart Game</button>
                </div>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="app.js"></script>

</body>
</html>
